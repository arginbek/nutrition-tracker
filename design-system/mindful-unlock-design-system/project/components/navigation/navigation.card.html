<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--surface-app); font-family: var(--font-sans); padding: 0; }
  .stage { position: relative; height: 200px; background:
      radial-gradient(120% 80% at 50% 0%, #1a160f 0%, var(--surface-app) 60%); display:flex; align-items:flex-end; }
  .bar { width: 100%; }
</style>
</head>
<body>
<div class="stage"><div id="root" class="bar"></div></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/feather-icons@4.29.2/dist/feather.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { TabBar } = window.MindfulUnlockDesignSystem_bf3027;
  function Feather({ name, size = 22 }) {
    const i = window.feather.icons[name];
    return <span style={{ display: "inline-flex" }} dangerouslySetInnerHTML={{ __html: i ? i.toSvg({ width: size, height: size }) : "" }} />;
  }
  function Demo() {
    const [tab, setTab] = React.useState("apps");
    return (
      <TabBar activeId={tab} onSelect={setTab} items={[
        { id: "apps", label: "Apps", icon: <Feather name="shield" /> },
        { id: "journal", label: "Journal", icon: <Feather name="book-open" /> },
        { id: "insights", label: "Insights", icon: <Feather name="bar-chart-2" /> },
      ]} />
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
