<!-- @dsCard group="Components" viewport="700x300" name="Forms" subtitle="Field (reflection input) · Checkbox" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--surface-app); font-family: var(--font-sans); padding: 22px; }
  .wrap { max-width: 520px; display: flex; flex-direction: column; gap: 16px; }
  .lbl { color: var(--text-muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; }
  .checkrow { display:flex; align-items:center; gap: 14px; background: var(--surface-card); border:1px solid var(--border-hairline); border-radius: var(--r-lg); padding: 14px; }
  .checkname { flex:1; color: var(--text-primary); font-size: 15px; font-weight: 500; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/feather-icons@4.29.2/dist/feather.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Field, Checkbox, IconTile } = window.MindfulUnlockDesignSystem_bf3027;
  function Feather({ name, size = 16, color = "currentColor" }) {
    const i = window.feather.icons[name];
    return <span style={{ display: "inline-flex" }} dangerouslySetInnerHTML={{ __html: i ? i.toSvg({ width: size, height: size, color }) : "" }} />;
  }
  function Demo() {
    const [a, setA] = React.useState(true);
    const [b, setB] = React.useState(false);
    return (
      <div className="wrap">
        <div>
          <div className="lbl">Field — intention</div>
          <Field rows={3} defaultValue="I want to reply to one message, then close it." />
        </div>
        <div>
          <div className="lbl">Field — oath (purple)</div>
          <Field rows={2} accent="var(--mu-purple)" placeholder="I swear this is essential because..." />
        </div>
        <div>
          <div className="lbl">Checkbox</div>
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            <div className="checkrow"><IconTile color="#E1306C" size={40}><Feather name="instagram" size={18} /></IconTile><span className="checkname">Instagram</span><Checkbox checked={a} onChange={() => setA(!a)} /></div>
            <div className="checkrow"><IconTile color="#FF0000" size={40}><Feather name="youtube" size={18} /></IconTile><span className="checkname">YouTube</span><Checkbox checked={b} onChange={() => setB(!b)} /></div>
          </div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
