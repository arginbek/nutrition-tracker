<!-- @dsCard group="Colors" viewport="700x190" name="Neutrals & Surfaces" subtitle="Near-black canvas, warm off-white text" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-app); font-family: var(--font-sans); padding: 20px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .sw { border-radius: var(--r-lg); border: 1px solid var(--border-hairline); overflow: hidden; }
  .chip { height: 58px; }
  .meta { padding: 9px 11px; background: var(--surface-card); }
  .name { color: var(--text-primary); font-size: 12px; font-weight: 600; }
  .hex { color: var(--text-muted); font-size: 11px; font-variant-numeric: tabular-nums; margin-top: 2px; }
</style>
</head>
<body>
  <div class="grid">
    <div class="sw"><div class="chip" style="background:#0A0A0E"></div><div class="meta"><div class="name">Background</div><div class="hex">#0A0A0E</div></div></div>
    <div class="sw"><div class="chip" style="background:#13131A"></div><div class="meta"><div class="name">Card</div><div class="hex">#13131A</div></div></div>
    <div class="sw"><div class="chip" style="background:#18181F"></div><div class="meta"><div class="name">Surface</div><div class="hex">#18181F</div></div></div>
    <div class="sw"><div class="chip" style="background:#1C1C26"></div><div class="meta"><div class="name">Secondary</div><div class="hex">#1C1C26</div></div></div>
    <div class="sw"><div class="chip" style="background:#1E1E2A"></div><div class="meta"><div class="name">Border</div><div class="hex">#1E1E2A</div></div></div>
    <div class="sw"><div class="chip" style="background:#F0EDE8"></div><div class="meta"><div class="name">Text</div><div class="hex">#F0EDE8</div></div></div>
    <div class="sw"><div class="chip" style="background:#B8B4BE"></div><div class="meta"><div class="name">Body</div><div class="hex">#B8B4BE</div></div></div>
    <div class="sw"><div class="chip" style="background:#6B6875"></div><div class="meta"><div class="name">Muted</div><div class="hex">#6B6875</div></div></div>
  </div>
</body>
</html>
