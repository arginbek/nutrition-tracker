<!-- @dsCard group="Type" viewport="700x200" name="Body, Captions & Labels" subtitle="Inter Regular/Medium — copy & metadata" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-app); font-family: var(--font-sans); padding: 22px; }
  .block { padding: 7px 0; }
  .spec { color: var(--text-muted); font-size: 11px; font-variant-numeric: tabular-nums; margin-top: 3px; }
  .eyebrow { text-transform: uppercase; letter-spacing: 0.8px; font-weight: 600; font-size: 13px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="block"><div style="font-size:15px;line-height:1.45;color:var(--text-body)">Take a break. If you still need it after 10 minutes, you can unlock it then.</div><div class="spec">15 / 400 · Body · --text-body</div></div>
  <div class="block"><div style="font-size:14px;color:var(--text-primary)">I want to check my messages</div><div class="spec">14 / 400 · Base · --text-primary</div></div>
  <div class="block"><div class="eyebrow">Recent Sessions</div><div class="spec">13 / 600 · Uppercase label · 0.8px tracking</div></div>
  <div class="block"><div style="font-size:12px;color:var(--text-muted)">Visit 2 today · 3m ago</div><div class="spec">12 / 400 · Caption · --text-muted</div></div>
</body>
</html>
