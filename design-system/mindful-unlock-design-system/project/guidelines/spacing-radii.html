<!-- @dsCard group="Spacing" viewport="700x160" name="Radii" subtitle="8 → 16 → 20 → pill; 16 is the signature" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-app); font-family: var(--font-sans); padding: 22px; display:flex; gap: 16px; align-items:flex-end; }
  .item { text-align:center; }
  .box { width: 72px; height: 72px; background: var(--surface-card); border: 1px solid var(--mu-amber); }
  .name { color: var(--text-primary); font-size: 12px; font-weight: 600; margin-top: 8px; }
  .val { color: var(--text-muted); font-size: 11px; }
</style>
</head>
<body>
  <div class="item"><div class="box" style="border-radius:8px"></div><div class="name">sm</div><div class="val">8px</div></div>
  <div class="item"><div class="box" style="border-radius:12px"></div><div class="name">md</div><div class="val">12px</div></div>
  <div class="item"><div class="box" style="border-radius:14px"></div><div class="name">lg</div><div class="val">14px</div></div>
  <div class="item"><div class="box" style="border-radius:16px"></div><div class="name">xl ★</div><div class="val">16px</div></div>
  <div class="item"><div class="box" style="border-radius:20px"></div><div class="name">2xl</div><div class="val">20px</div></div>
  <div class="item"><div class="box" style="border-radius:999px"></div><div class="name">pill</div><div class="val">full</div></div>
</body>
</html>
