<!-- @dsCard group="Colors" viewport="700x180" name="Brand & Accent" subtitle="Amber primary, commitment purple" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-app); font-family: var(--font-sans); padding: 20px; }
  .row { display: flex; gap: 12px; }
  .sw { flex: 1; border-radius: var(--r-lg); border: 1px solid var(--border-hairline); overflow: hidden; }
  .chip { height: 74px; }
  .meta { padding: 10px 12px; background: var(--surface-card); }
  .name { color: var(--text-primary); font-size: 13px; font-weight: 600; }
  .hex { color: var(--text-muted); font-size: 12px; font-variant-numeric: tabular-nums; margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#F59E0B"></div><div class="meta"><div class="name">Amber</div><div class="hex">#F59E0B · --mu-amber</div></div></div>
    <div class="sw"><div class="chip" style="background:#FCD34D"></div><div class="meta"><div class="name">Amber Light</div><div class="hex">#FCD34D · --mu-amber-light</div></div></div>
    <div class="sw"><div class="chip" style="background:#7C3AED"></div><div class="meta"><div class="name">Purple</div><div class="hex">#7C3AED · --mu-purple</div></div></div>
    <div class="sw"><div class="chip" style="background:#A78BFA"></div><div class="meta"><div class="name">Purple Light</div><div class="hex">#A78BFA · --mu-purple-light</div></div></div>
  </div>
</body>
</html>
