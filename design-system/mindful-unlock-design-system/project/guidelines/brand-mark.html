<!-- @dsCard group="Brand" viewport="700x230" name="App Mark" subtitle="A glowing padlock — warmth held in the dark" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-app); font-family: var(--font-sans); padding: 24px; display:flex; align-items:center; gap: 28px; }
  .icon { width: 132px; height: 132px; border-radius: 30px; flex-shrink:0; overflow:hidden; border: 1px solid var(--border-hairline); }
  .icon img { width: 100%; height: 100%; display:block; }
  h1 { color: var(--text-primary); font-size: 22px; font-weight: 700; margin: 0; }
  p { color: var(--text-body); font-size: 14px; line-height: 1.5; margin: 8px 0 0; max-width: 420px; }
  .tag { color: var(--mu-amber); font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; margin-top: 12px; }
</style>
</head>
<body>
  <div class="icon"><img src="../assets/app-icon.png" alt="Mindful Unlock app icon" /></div>
  <div>
    <h1>Mindful Unlock</h1>
    <p>The mark is a single warm padlock glowing out of near-black — protective, not punitive. It sets the whole system's tone: calm, dark, and quietly intentional.</p>
    <div class="tag">Pause before you open</div>
  </div>
</body>
</html>
